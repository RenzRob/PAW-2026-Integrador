name: Deploy to GCloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: DB_USER,DB_PASSWORD,GEMINI_API_KEY,JWT_SECRET,DOMAIN,CERTBOT_EMAIL
          script: |
            cd /home/rrobles/PAW-2026-Integrador
            git pull origin main
            cd app
            {
              echo "NODE_ENV=production"
              echo "LOG_LEVEL=info"
              echo "PORT=3000"
              echo "DOCKERFILE_PATH=Dockerfile.ci"
              echo "DB_HOST=mysql"
              echo "DB_PORT=3306"
              echo "DB_NAME=uno_argentino"
              echo "DB_USER=$DB_USER"
              echo "DB_PASSWORD=$DB_PASSWORD"
              echo "GEMINI_API_KEY=$GEMINI_API_KEY"
              echo "JWT_SECRET=$JWT_SECRET"
              echo "DOMAIN=$DOMAIN"
              echo "CERTBOT_EMAIL=$CERTBOT_EMAIL"
            } > .env
            DOCKER_BUILDKIT=0 docker compose --profile https up -d --build app nginx
            sleep 3
            docker compose --profile https run --rm --entrypoint certbot certbot certonly \
              --webroot -w /var/www/certbot \
              --email "$CERTBOT_EMAIL" \
              -d "$DOMAIN" \
              --rsa-key-size 4096 \
              --agree-tos \
              --non-interactive \
              --keep-until-expiring
            docker compose --profile https exec nginx nginx -s reload
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOMAIN: ${{ secrets.DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
